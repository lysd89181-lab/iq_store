<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iQ Store - تسجيل الدخول</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: linear-gradient(135deg, #060814, #0d1127);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }
        .container {
            background: #131936; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 100%; max-width: 400px; padding: 30px; border: 1px solid rgba(0,242,254,0.2);
        }
        .form-header { text-align: center; margin-bottom: 25px; }
        .form-header h2 { color: #00f2fe; font-size: 22px; margin-bottom: 6px; }
        .form-header p { color: #8e9bb8; font-size: 13px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; color: #cbd5e1; font-size: 13px; }
        .input-group input {
            width: 100%; padding: 11px 14px; background: #0a0f23; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: #fff; font-size: 14px; outline: none; text-align: right;
        }
        .input-group input:focus { border-color: #00f2fe; }
        .btn {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #9d4edd, #7b2cbf);
            border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: bold;
            cursor: pointer; margin-top: 8px;
        }
        .btn.green { background: linear-gradient(135deg, #10b981, #059669); }
        .switch-text { text-align: center; margin-top: 18px; font-size: 13px; color: #8e9bb8; }
        .switch-text a { color: #00f2fe; text-decoration: none; font-weight: bold; cursor: pointer; }
        .form-box { display: none; }
        .form-box.active { display: block; }
        .msg { text-align: center; margin-top: 10px; font-size: 12px; display: none; }
        .msg.show { display: block; }
        .msg.error { color: #ef4444; }
        .msg.success { color: #10b981; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginForm" class="form-box active">
        <div class="form-header">
            <h2>🔐 تسجيل الدخول</h2>
            <p>مرحباً بك في iQ Store</p>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="loginEmail" required placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">🚀 دخول</button>
        </form>
        <p class="msg" id="loginMsg"></p>
        <div class="switch-text">
            ليس لديك حساب؟ <a onclick="toggleForms('signup')">إنشاء حساب جديد</a>
        </div>
    </div>

    <div id="signupForm" class="form-box">
        <div class="form-header">
            <h2>✨ إنشاء حساب</h2>
            <p>ابدأ اليوم مع iQ Store</p>
        </div>
        <form onsubmit="handleSignup(event)">
            <div class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" id="registerName" required placeholder="أدخل اسمك">
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="registerEmail" required placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="registerPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn green">✅ تسجيل</button>
        </form>
        <p class="msg" id="signupMsg"></p>
        <div class="switch-text">
            لديك حساب؟ <a onclick="toggleForms('login')">تسجيل الدخول</a>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsDZDLbzB0Vfqgo8SenbE4DTxjc7m_xqA",
        authDomain: "iq-store-f6195.firebaseapp.com",
        projectId: "iq-store-f6195",
        storageBucket: "iq-store-f6195.firebasestorage.app",
        messagingSenderId: "971567926936",
        appId: "1:971567926936:web:f85205b7d1ea210d3c0aed"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function toggleForms(form) {
        document.getElementById('loginForm').classList.toggle('active', form === 'login');
        document.getElementById('signupForm').classList.toggle('active', form === 'signup');
    }

    function showMsg(id, text, isError) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg show ' + (isError ? 'error' : 'success');
    }

    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
            window.location.href = 'index.html';
        } catch (err) {
            let msg = 'حدث خطأ';
            if (err.message.includes('invalid')) msg = 'كلمة مرور خاطئة';
            if (err.message.includes('no user')) msg = 'الحساب غير موجود';
            showMsg('loginMsg', '❌ ' + msg, true);
        }
    }

    async function handleSignup(e) {
        e.preventDefault();
        const name = document.getElementById('registerName').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const pass = document.getElementById('registerPassword').value;
        if (pass.length < 6) return showMsg('signupMsg', '❌ كلمة المرور 6 أحرف على الأقل', true);
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection("users").doc(cred.user.uid).set({
                uid: cred.user.uid, name: name, username: name, email: email, balance: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            window.location.href = 'index.html';
        } catch (err) {
            showMsg('signupMsg', '❌ ' + (err.code === 'auth/email-already-in-use' ? 'البريد مستخدم مسبقاً' : 'حدث خطأ'), true);
        }
    }
</script>
</body>
</html>
